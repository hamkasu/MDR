{% extends "base.html" %}

{% block title %}Add Supplier - Document Management System{% endblock %}

{% block page_title %}Add New Supplier{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label"><strong>Supplier Name *</strong></label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><strong>Default Currency</strong></label>
                            <select name="default_currency" class="form-select">
                                {% for currency in currencies %}
                                <option value="{{ currency }}">{{ currency }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><strong>Contact Email</strong></label>
                            <input type="email" name="contact_email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><strong>Contact Phone</strong></label>
                            <input type="tel" name="contact_phone" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><strong>Notes</strong></label>
                            <textarea name="notes" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Add Supplier</button>
                            <a href="{{ url_for('invoices.suppliers_list') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
