{% extends "base.html" %}

{% block title %}Edit Source of Truth - Document Management System{% endblock %}

{% block page_title %}Edit Source of Truth Entry{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title mb-4">Edit Fact</h5>

                    <form method="POST">
                        <div class="mb-3">
                            <label for="fact_name" class="form-label">Fact Name *</label>
                            <input type="text" class="form-control" id="fact_name" name="fact_name" value="{{ fact.fact_name }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="master_document_id" class="form-label">Master Document</label>
                            <input type="text" class="form-control" value="{{ fact.master_document.name }}" disabled>
                            <small class="text-muted">Master document cannot be changed.</small>
                        </div>

                        <div class="mb-3">
                            <label for="also_appears_in" class="form-label">Also Appears In</label>
                            <div style="max-height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 5px;">
                                {% for doc in documents %}
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="doc_{{ doc.doc_id }}" name="also_appears_in" value="{{ doc.doc_id }}" {% if doc in fact.related_documents %}checked{% endif %}>
                                    <label class="form-check-label" for="doc_{{ doc.doc_id }}">
                                        {{ doc.doc_id }} - {{ doc.name }}
                                    </label>
                                </div>
                                {% endfor %}
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="sync_rule" class="form-label">Sync Rule / Notes</label>
                            <textarea class="form-control" id="sync_rule" name="sync_rule" rows="4">{{ fact.sync_rule or '' }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                <option value="Unresolved" {% if fact.status == 'Unresolved' %}selected{% endif %}>Unresolved</option>
                                <option value="Resolved" {% if fact.status == 'Resolved' %}selected{% endif %}>Resolved</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a href="{{ url_for('source_of_truth.sot_list') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
